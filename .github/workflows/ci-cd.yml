name: vendly-client

on:
  push:
    branches: [ main, staging ]

env:
  IMAGE_NAME: vendly-client
  REPO_NAME: vendly-team/vendly-client
  REGISTRY: ghcr.io

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      build_mode: ${{ steps.meta.outputs.build_mode }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag and build mode
        id: meta
        run: |
          echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "build_mode=production" >> $GITHUB_OUTPUT
          else
            echo "build_mode=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BUILD_MODE=${{ steps.meta.outputs.build_mode }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}-${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:buildcache-${{ github.ref_name }}
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:buildcache-${{ github.ref_name }},mode=max

  deploy_staging:
    if: github.ref == 'refs/heads/staging'
    needs: [build_and_push]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:staging-${{ needs.build_and_push.outputs.image_tag }}"

            echo "${{ secrets.GH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            mkdir -p $HOME/vendly-client-staging

            cat > $HOME/vendly-client-staging/docker-compose.yml << EOF
            services:
              vendly-client-staging:
                image: ${IMAGE}
                container_name: vendly-client-staging
                restart: unless-stopped
                ports:
                  - "153:80"
                networks:
                  - vendly-client-staging-net

            networks:
              vendly-client-staging-net:
                driver: bridge
            EOF

            docker pull "$IMAGE"

            cd $HOME/vendly-client-staging
            docker compose down || true
            docker compose up -d --remove-orphans

            docker image prune -f

  deploy_prod:
    if: github.ref == 'refs/heads/main'
    needs: [build_and_push]
    runs-on: ubuntu-latest

    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE="${{ env.REGISTRY }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:main-${{ needs.build_and_push.outputs.image_tag }}"

            echo "${{ secrets.GH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            mkdir -p $HOME/vendly-client-prod

            cat > $HOME/vendly-client-prod/docker-compose.yml << EOF
            services:
              vendly-client-prod:
                image: ${IMAGE}
                container_name: vendly-client-prod
                restart: unless-stopped
                ports:
                  - "152:80"
                networks:
                  - vendly-client-prod-net

            networks:
              vendly-client-prod-net:
                driver: bridge
            EOF

            docker pull "$IMAGE"

            cd $HOME/vendly-client-prod
            docker compose down || true
            docker compose up -d --remove-orphans

            docker image prune -f
